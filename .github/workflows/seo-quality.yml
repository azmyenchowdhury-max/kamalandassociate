name: SEO and Performance Quality Gates

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  seo-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate local WebP assets
        run: npm run images:webp

      - name: Build minified static assets
        run: npm run build:static

      - name: Generate sitemap and run SEO/schema checks
        run: npm run seo:check
